<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Entrar Loja Digital</title>
    <link rel="stylesheet" href="/src/style/reset.css">
    <link rel="stylesheet" href="/src/style/global.css">
</head>
<body>
    <header>
        <nav>
            <a href="/index.html">
                <img src="../assets/logo.svg" alt="logo da loja na cor rosa">
                <span>Loja Digital</span>
            </a>
        </nav>
    </header>
    <main>
        <form>
            <h1>Acesse sua conta</h1>
            <p>Novo cliente? Então registre-se <a href="#">aqui</a>.</p>
            <div class="inputs">
                <div>
                    <label for="">Email *</label>
                    <input type="email" placeholder="Ex: usuario@gmail.com" required/>
                </div>
                <div>
                    <label for="">Senha *</label>
                    <input type="password" placeholder="Ex: 123456"/>
                </div>
                <span>
                    <a href="">Esqueci minha senha</a>
                </span>
                <button>Acessar Conta</button>
                <div class="others">
                    <span>Ou faça login com</span>
                    <nav>
                        <ul>
                            <li>
                                <a href="">
                                    <img src="/src/assets/gmail.svg" alt="icone do gmail">
                                </a>
                            </li>
                            <li>
                                <a href="">
                                    <img src="/src/assets/facebook.svg" alt="icone do facebook">
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>

                
            </div>
        </form>
    </main>
</body>
</html>
